<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando... | SafraCred</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-17857609036"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-17857609036');
    </script>

    <script>
      gtag('event', 'conversion', {
          'send_to': 'AW-17857609036/N9xdCJ7Fro4cEMz6lcNC',
          'value': 1.0,
          'currency': 'BRL'
      });
    </script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Poppins', 'sans-serif'] },
                    colors: {
                        safraCred: {
                            primary: '#00003c',
                            dark: '#00002b',
                            light: '#f0f2f5',
                            accent: '#25D366' // Cor do WhatsApp
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Animação suave para o contador */
        #countdown { transition: all 0.3s ease; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-safraCred-light font-sans flex items-center justify-center min-h-screen p-4">

    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-P4QTTV7F" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <main class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl text-center border-t-8 border-safraCred-primary">
        <div class="flex items-center justify-center gap-2 mb-6">
            <span class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="text-xs font-bold text-green-600 uppercase tracking-widest">Conexão Segura Ativa</span>
        </div>

        <h1 class="text-2xl font-bold text-safraCred-primary mb-2">
            Você é o <span class="text-safraCred-accent underline">primeiro da fila</span>
        </h1>
        
        <p class="text-gray-600 mb-8 leading-relaxed">
            Estamos preparando sua ficha. Você será direcionado para o atendente em:
        </p>

        <div class="mb-8">
            <div id="countdown-circle" class="w-24 h-24 border-4 border-safraCred-primary rounded-full flex items-center justify-center mx-auto mb-4 pulse">
                <span id="countdown" class="text-4xl font-bold text-safraCred-primary">2</span>
            </div>
            <p class="text-sm font-semibold text-gray-400 uppercase">Segundos</p>
        </div>
        
        <a id="whatsapp-button" href="#" class="w-full block bg-safraCred-primary hover:bg-safraCred-dark text-white font-bold py-4 px-6 rounded-xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-3">
            <i class="fab fa-whatsapp text-2xl"></i>
            Ir para o WhatsApp agora
        </a>

        <p class="mt-6 text-[10px] text-gray-400 px-4">
            SafraCred: Correspondente Autorizado. Seus dados estão protegidos por criptografia de ponta a ponta.
        </p>
    </main>

    <script>
        (function() {
            const phoneNumber = '5511948244212';
            const message = 'Olá! Vi o anúncio no Google e gostaria de saber mais sobre.';
            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

            // Atualiza o link do botão
            document.getElementById('whatsapp-button').href = whatsappUrl;
            
            let seconds = 2; // Alterado para 2 segundos
            const countdownElement = document.getElementById('countdown');
            
            const interval = setInterval(() => {
                seconds--;
                if (countdownElement) {
                    countdownElement.textContent = seconds;
                }

                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.replace(whatsappUrl); // Redirecionamento 
                }
            }, 1000);
        })();
    </script>

</body>
</html>
